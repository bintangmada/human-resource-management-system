server:
  port: 8021
  error:
    include-message: always

spring:
  application:
    name: auth-service

  # Database Connection (Same shared database schema)
  datasource:
    url: jdbc:postgresql://${HRMS_DB_HOST:localhost}:${HRMS_DB_PORT:5434}/${HRMS_DB_NAME:hrms_main}
    username: ${HRMS_DB_USERNAME:postgres}
    password: ${HRMS_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # JPA & Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: ${HRMS_JPA_DDL_AUTO:update}
    show-sql: ${HRMS_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Email Configuration (SMTP)
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Custom Application Properties
app:
  base-url: ${HRMS_BASE_URL:http://localhost:8020} # Point to the Gateway port so activation links go through the gateway
