spring:
  application:
    name: employee-service

  # Email Configuration (SMTP)
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Database Connection Configuration (PostgreSQL)
  datasource:
    url: jdbc:postgresql://${HRMS_DB_HOST:localhost}:${HRMS_DB_PORT:5434}/${HRMS_DB_NAME:hrms_main}
    username: ${HRMS_DB_USERNAME:postgres}
    password: ${HRMS_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HRMS_DB_POOL_MA   78 bX:20}
      minimum-idle: ${HRMS_DB_POOL_MIN:5}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 20000

  # JPA & Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: ${HRMS_JPA_DDL_AUTO:update} # Secara default menggunakan 'update' untuk mempermudah development lokal, dapat di-override ke 'validate' di production
    show-sql: ${HRMS_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Caching Configuration (Redis)
  data:
    redis:
      host: ${HRMS_REDIS_HOST:localhost}
      port: ${HRMS_REDIS_PORT:6379}
      password: ${HRMS_REDIS_PASSWORD:hrms_redis_secret} # Default password locally, can be overridden via env
      timeout: 60000

  # Messaging / Event Broker Configuration (Apache Kafka)
  kafka:
    bootstrap-servers: ${HRMS_KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: employee-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.hrms.enterprise.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Server runtime port assignment
server:
  port: 8020
  error:
    include-message: always

# Springdoc OpenAPI Swagger Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    # Hides the Schemas/Entities section completely from the bottom of the page
    default-models-expand-depth: -1
  api-docs:
    path: /v3/api-docs
  # Shows only our actual rest endpoints and excludes spring default ones (like /error)
  paths-to-match: /api/v1/**

# Custom Application Properties
app:
  base-url: ${HRMS_BASE_URL:http://localhost:8020}

