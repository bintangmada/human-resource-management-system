spring:
  application:
    name: employee-service

  # Database Connection Configuration (PostgreSQL)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hrms_main}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 20000

  # JPA & Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update} # Secara default menggunakan 'update' untuk mempermudah development lokal, dapat di-override ke 'validate' di production
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Caching Configuration (Redis)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:} # Blank by default locally, injected on VPS
      timeout: 60000

  # Messaging / Event Broker Configuration (Apache Kafka)
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: employee-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.hrms.enterprise.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Server runtime port assignment
server:
  port: 8020
  error:
    include-message: always

# Springdoc OpenAPI Swagger Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    # Hides the Schemas/Entities section completely from the bottom of the page
    default-models-expand-depth: -1
  api-docs:
    path: /v3/api-docs
  # Shows only our actual rest endpoints and excludes spring default ones (like /error)
  paths-to-match: /api/v1/**
